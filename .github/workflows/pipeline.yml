name: Linting and Tests
on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  # Required to checkout the codebase.
  contents: read

jobs:
  check-code-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Poetry
        uses: matrix-org/setup-python-poetry@5bbf6603c5c930615ec8a29f1b5d7d258d905aa4 # v2
        with:
          install-project: "false"
          python-version: "3.12"
          poetry-version: "2.2.1"

      - run: poetry run tox -e check_codestyle

  check-types-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Poetry
        uses: matrix-org/setup-python-poetry@5bbf6603c5c930615ec8a29f1b5d7d258d905aa4 # v2
        with:
          install-project: "false"
          python-version: "3.12"
          poetry-version: "2.2.1"

      - run: poetry run tox -e check_types

  run-unit-tests:
    name: Unit tests
    needs: [check-code-style, check-types-mypy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python -m twisted.trial tests

  run-unit-tests-olddeps:
    name: Unit tests (old dependencies)
    needs: [ check-code-style, check-types-mypy ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
      - name: Patch pyproject.toml to require oldest dependencies
        run: |
          # Ugly. Could use something like https://pyproject-parser.readthedocs.io/en/latest/cli.html#info in the future.
          sed --in-place=.bak -e '/requires-python/!s/>=/==/g' pyproject.toml
          diff pyproject.toml.bak pyproject.toml || true # diff returns 1 if there is a change
      - name: Install Sygnal
        run: python -m pip install -e .
      - run: python -m twisted.trial tests

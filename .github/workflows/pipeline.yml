name: Linting and Tests
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check-code-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv run ruff check sygnal/ tests/ stubs
      - run: uv run ruff format --check sygnal/ tests/ stubs

  check-types-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv run mypy sygnal/ tests/ stubs

  run-unit-tests:
    name: Unit tests
    needs: [check-code-style, check-types-mypy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv run pytest tests/

  run-unit-tests-olddeps:
    name: Unit tests (old dependencies)
    needs: [check-code-style, check-types-mypy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Patch pyproject.toml to require oldest dependencies
        run: |
          # Ugly. Could use something like https://pyproject-parser.readthedocs.io/en/latest/cli.html#info in the future.
          sed --in-place=.bak -e '/requires-python/!s/>=/==/g' pyproject.toml
          diff pyproject.toml.bak pyproject.toml || true # diff returns 1 if there is a change
      - name: Install Sygnal
        run: python -m pip install -e .
      - name: Install test dependencies
        run: python -m pip install pytest pytest-asyncio pytest-aiohttp
      - run: python -m pytest tests/

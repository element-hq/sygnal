name: Linting and Tests
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check-code-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv run ruff check sygnal/ tests/
      - run: uv run ruff format --check sygnal/ tests/

  check-types-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv run mypy sygnal/ tests/

  run-unit-tests:
    name: Unit tests
    needs: [check-code-style, check-types-mypy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv run pytest tests/

  run-unit-tests-olddeps:
    name: Unit tests (old dependencies)
    needs: [check-code-style, check-types-mypy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --resolution=lowest-direct --python=3.10
      - run: uv run pytest tests/

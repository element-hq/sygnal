[mypy]
check_untyped_defs = True
disallow_untyped_defs = True
warn_no_return = True
warn_return_any = True
warn_unused_ignores = True
show_error_codes = True
show_traceback = True

[mypy-py_vapid]
ignore_missing_imports = True

[mypy-pywebpush]
ignore_missing_imports = True

[mypy-sygnal.apnstruncate]
warn_return_any = False
